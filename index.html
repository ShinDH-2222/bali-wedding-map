function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    center: {lat:-8.65, lng:115.18},
    zoom: 11,
    mapTypeControl: true,
    streetViewControl: false,
    mapId: 'bali_wedding_2026',
  });

  const hotels = [
    { no:1, name:'노보텔 발리 공항', lat:-8.7440, lng:115.1652, from:'09/14', to:'09/15', color:'#2196F3', note:'공항 인근 첫날' },
    { no:2, name:'더 카욘 밸리 리조트', lat:-8.4979151, lng:115.27557890000001, from:'09/15', to:'09/18', color:'#4CAF50', note:'우붓 · 아고다 예약' },
    { no:3, name:'아야나 리조트 발리', lat:-8.7862, lng:115.1393, from:'09/18', to:'09/21', color:'#FF9800', note:'네이버 · 짐바란' },
    { no:'', name:'❌ 페레레난 (취소)', lat:-8.6518, lng:115.1215, from:'~~09/18~~', to:'~~09/21~~', color:'#999', note:'에어비앤비 · 100% 환불', cancelled:true },
    { no:4, name:'아야나 빌라스', lat:-8.7880, lng:115.1366, from:'09/21', to:'09/23', color:'#E91E63', note:'Stayzaaa · 같은 단지' },
    { no:5, name:'알로프트 발리 꾸타', lat:-8.7150, lng:115.1708, from:'09/23', to:'09/24', color:'#9C27B0', note:'여기어때 · 출발 전날' },
  ];

  const infoWindow = new google.maps.InfoWindow();
  
  hotels.forEach(h => {
    const active = !h.cancelled;
    const label = h.cancelled ? '✕' : String(h.no);
    
    const marker = new google.maps.marker.AdvancedMarkerElement({
      map,
      position: {lat:h.lat, lng:h.lng},
      title: h.name,
      content: (() => {
        const div = document.createElement('div');
        div.style.cssText = 'background:white;border:3px solid '+h.color+';border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:'+h.color+';box-shadow:0 2px 8px rgba(0,0,0,0.3);'+(active?'':'opacity:0.5');
        div.textContent = label;
        return div;
      })(),
    });

    marker.addListener('click', () => {
      infoWindow.setContent(
        '<b>'+(active?'🏨':'❌')+' '+h.name+'</b><br>'+
        '📅 '+h.from+' → '+h.to+'<br>'+
        '<span style="color:'+h.color+'">'+h.note+'</span>'
      );
      infoWindow.open(map, marker);
    });
  });

  // 공항
  new google.maps.marker.AdvancedMarkerElement({
    map, position: {lat:-8.7481, lng:115.1672},
    title: 'DPS 공항',
    content: (() => {
      const div = document.createElement('div');
      div.style.cssText = 'background:#333;border-radius:50%;width:16px;height:16px;box-shadow:0 0 0 4px rgba(0,0,0,0.2);';
      return div;
    })(),
  });

  // 도로 경로
  routes.forEach((r, i) => {
    const line = new google.maps.Polyline({
      path: r.coords,
      map,
      strokeColor: routeColors[i],
      strokeWeight: 4,
      strokeOpacity: 0.7,
    });
    line.addListener('click', (event) => {
      infoWindow.setContent('🚗 '+r.dist+' · '+r.dur+'<br><small>'+r.from+' → '+r.to+'</small>');
      infoWindow.setPosition(event.latLng);
      infoWindow.open(map);
    });
  });

  // 범례
  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = '<h3>💒 발리 결혼여행 2026.09.14~24</h3>' +
    '<div style="font-size:11px;color:#888;margin-bottom:6px;">✈️ 서울 ↔ 발리 · 10박 11일</div>' +
    hotels.map(h => 
      '<div style="'+(h.cancelled?'text-decoration:line-through;color:#999;':'')+'">'+
      '<span class="dot" style="background:'+h.color+'"></span>'+
      '<b>'+(h.cancelled?'':h.no+'. ')+h.name+'</b> '+h.from+'~'+h.to+
      '<br><small style="margin-left:16px;color:#666">'+h.note+'</small></div>'
    ).join('');
  map.controls[google.maps.ControlPosition.RIGHT_TOP].push(legend);

  const strip = document.createElement('div');
  strip.className = 'route-strip';
  strip.textContent = '🚗 컬러 선 = 실제 도로 경로 (클릭시 거리/시간)';
  map.controls[google.maps.ControlPosition.BOTTOM_LEFT].push(strip);
}
