      '</div>'+
      '<b>🏨 호텔</b><br>'+
      hotels.map(function(h) {
        return '<div style="'+(h.cancelled?'text-decoration:line-through;color:#999;':'')+'">'+
        '<span class="dot" style="background:'+h.color+'"></span>'+
        '<b>'+(h.cancelled?'':h.no+'. ')+h.name+'</b> '+h.date+
        '<br><small style="margin-left:16px;color:#666">'+h.note+'</small></div>';
      }).join('')+
    '</div>';
  map.controls[google.maps.ControlPosition.RIGHT_TOP].push(wrap);

  setTimeout(function() {
    document.getElementById('legend-hdr').addEventListener('click', function() {
      document.getElementById('legend-body').classList.toggle('collapsed');
      document.getElementById('legend-btn').classList.toggle('collapsed');
    });
  }, 300);

  var strip = document.createElement('div');
  strip.className = 'route-strip';
  strip.innerHTML = '🔴 빨간선 = 09/15 로드트립 | 🚗 컬러선 = 호텔 이동경로 (클릭시 거리/시간)';
  map.controls[google.maps.ControlPosition.BOTTOM_LEFT].push(strip);
}
</script>
