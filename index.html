  return L.divIcon({
    className: '', html: '<div style="background:white;border:3px solid '+color+';border-radius:50%;width:34px;height:34px;text-align:center;line-height:28px;font-weight:800;font-size:15px;color:'+color+';box-shadow:0 2px 8px rgba(0,0,0,0.3);">'+num+'</div>',
    iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-20]
  });
}

L.marker(airport, { icon: L.divIcon({className:'',html:'<div style="background:#333;border-radius:50%;width:16px;height:16px;box-shadow:0 0 0 4px rgba(0,0,0,0.15);"></div>',iconSize:[16,16],iconAnchor:[8,8]}) })
 .bindPopup('<b>✈️ DPS 공항</b><br>09/14 도착 · 09/23 출발').addTo(map);

hotels.forEach(h => {
  const active = typeof h.no === 'number';
  L.marker([h.lat, h.lng], {
    icon: createIcon(h.no, active?h.color:'#999'), opacity: active?1:0.5
  }).bindPopup('<b>'+(active?'🏨':'❌')+' '+h.name+'</b><br>📅 '+h.from+' → '+h.to+'<br><span style="color:'+h.color+'">'+h.note+'</span>').addTo(map);
});

routes.forEach((r, i) => {
  const line = L.polyline(r.coords, {
    color: routeColors[i], weight: 4, opacity: 0.7,
  }).bindPopup('🚗 '+r.dist+' · '+r.dur).addTo(map);
});

// 총계
let totalDist=0, totalMin=0;
routes.forEach(r=>{
  totalDist+=parseFloat(r.dist);
  const hh=(r.dur.match(/(\d+)\s*시간/)||['',0])[1]*60;
  const mm=(r.dur.match(/(\d+)\s*분/)||['',0])[1]*1;
  totalMin+=hh+mm;
});
const th=Math.floor(totalMin/60), tm=totalMin%60;

L.control({position:'topright'}).onAdd = function() {
  const d = L.DomUtil.create('div','legend');
  d.innerHTML = '<h3>💒 발리 결혼여행 2026.09.14~24</h3>' +
    '<div style="font-size:11px;color:#888;margin-bottom:8px;">✈️ 서울 ↔ 발리 · 10박 11일 | 🚗 총 이동: ~'+Math.round(totalDist)+'km, '+th+'h'+(tm>0?tm+'m':'')+'</div>' +
    hotels.map(h => '<div style="'+(typeof h.no!='number'?'text-decoration:line-through;color:#999;':'')+'"><span class="dot" style="background:'+h.color+'"></span><b>'+(typeof h.no=='number'?h.no+'. ':'')+h.name+'</b> '+h.from+'~'+h.to+'<br><small style="margin-left:16px;color:#666">'+h.note+'</small></div>').join('');
  return d;
}.addTo(map);

L.control({position:'bottomleft'}).onAdd = function() {
  const d = L.DomUtil.create('div','route-info');
  d.innerHTML = '🚗 컬러 실선 = 실제 도로 경로 (클릭시 거리/시간)';
  return d;
}.addTo(map);
</script>
</body>
</html>
