var gMap, gIw, gAllLines=[], gRoadTripLine=null, gActiveNode=null;

function initMap() {

  function mkMarker(lat,lng,color,label,opacity) {
    var d=document.createElement('div');

  }

  var hotels = [
    {no:'1',name:'노보텔 발리 공항',lat:-8.744,lng:115.1652,date:'09/14-15',color:'#2196F3',note:'공항 인근 첫날',nid:'n1'},
    {no:'2',name:'더 카욘 밸리 리조트',lat:-8.4979151,lng:115.27557890000001,date:'09/15-18',color:'#4CAF50',note:'우붓 · 아고다 예약',nid:'n2'},
    {no:'3',name:'아야나 리조트 발리',lat:-8.7862,lng:115.1393,date:'09/18-21',color:'#FF9800',note:'네이버 · 짐바란',nid:'n3'},
    {no:'',name:'❌ 페레레난 (취소)',lat:-8.6518,lng:115.1215,date:'취소',color:'#999',note:'에어비앤비 · 100% 환불',cancelled:true,nid:''},
    {no:'4',name:'아야나 빌라스',lat:-8.788,lng:115.1366,date:'09/21-23',color:'#E91E63',note:'Stayzaaa · 같은 단지',nid:'n4'},
    {no:'5',name:'알로프트 발리 꾸타',lat:-8.715,lng:115.1708,date:'09/23-24',color:'#9C27B0',note:'여기어때 · 출발 전날',nid:'n5'},
  ];

      gIw.setContent('<b>'+(h.cancelled?'❌':'🏨')+' '+h.name+'</b><br>📅 '+h.date+'<br><span style="color:'+h.color+'">'+h.note+'</span>');

    m.addListener('click',function(){gIw.setContent('<b>✈️ DPS 공항</b>');gIw.open({map:gMap,anchor:m});});

  ];
  roadTrip.forEach(function(p){

  ds.route({

      var td=0, tt=0;
      result.routes[0].legs.forEach(function(l) { td+=l.distance.value; tt+=l.duration.value; });

function buildLegend() {
  var wrap = document.createElement('div');
  wrap.className = 'legend-wrap';
  wrap.id = 'legendWrap';
  wrap.innerHTML = 
    '<div class="legend-header">'+
      '<div><h3>💒 발리 결혼여행 2026.09.14-24</h3>'+
      '<div style="font-size:11px;color:#888;margin-top:2px;">✈️ 서울 ↔ 발리 · 10박 11일</div></div>'+
      '<div class="legend-toggle">▼</div>'+
    '</div>'+
    '<div class="legend-body" id="legBody">'+
      '<div class="reset-btn" data-action="reset">🔄 전체보기</div>'+
      '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed #ccc;">'+
      '<b style="color:#ff6b6b;">🗓️ 09/15 로드트립</b> <span class="badge">NEW</span><br>'+
      '<small style="color:#666;">공항 → 1-1 가루다 → 1-2 타나바락 → 1-3 팔밀라(2h) → 1-4 울루와뚜 → 카욘밸리</small></div>'+
      '<b>🏨 클릭시 경로 하이라이트</b><br>'+
      litem('✈️','airport','DPS 공항','#333','')+
      litem('1','n1','노보텔 발리 공항','#2196F3','09/14-15<small style=color:#666> 공항 인근</small>')+
      litem('1-1','n11','가루다 위스누 꾸짜나','#e74c3c','🏛️')+
      litem('1-2','n12','타나바락 절벽 (짱구)','#e67e22','🧗')+
      litem('1-3','n13','팔밀라 비치클럽 (2h)','#2ecc71','🏖️')+
      litem('1-4','n14','울루와뚜 사원','#3498db','🛕')+
      litem('2','n2','더 카욘 밸리 리조트','#4CAF50','09/15-18<small style=color:#666> 우붓</small>')+
      litem('3','n3','아야나 리조트 발리','#FF9800','09/18-21<small style=color:#666> 짐바란</small>')+
      litem('✕','','페레레난 (취소)','#999','100% 환불<cancelled>')+
      litem('4','n4','아야나 빌라스','#E91E63','09/21-23<small style=color:#666> Stayzaaa</small>')+
      litem('5','n5','알로프트 발리 꾸타','#9C27B0','09/23-24<small style=color:#666> 여기어때</small>')+
    '</div>';
  
  // 이벤트 위임 방식 - onclick 대신 addEventListener
  wrap.addEventListener('click', function(e) {
    // 리셋 버튼
    var resetBtn = e.target.closest('[data-action="reset"]');
    if (resetBtn) { resetFilter(); return; }
    // 범례 헤더 → 접이식 토글
    if (e.target.closest('.legend-header')) { toggleLegend(); return; }
    // 범례 아이템 → 노드 필터
    var item = e.target.closest('.legend-item');
    if (item) { toggleNode(item.getAttribute('data-nid'), item); return; }
  });

  gMap.controls[google.maps.ControlPosition.RIGHT_TOP].push(wrap);

  var strip = document.createElement('div');
  strip.className = 'route-strip';
  strip.innerHTML = '🔴 로드트립 | ▶ 방향 표시 | 범례 클릭 = 하이라이트';
  gMap.controls[google.maps.ControlPosition.BOTTOM_LEFT].push(strip);
}

function litem(no, nid, name, color, extra) {
  var cls = nid ? 'legend-item' : '';
  var sty = extra.indexOf('<cancelled>')>=0 ? ' style="text-decoration:line-through;color:#999"' : '';
  extra = extra.replace('<cancelled>','');
  var dnid = nid ? ' data-nid="'+nid+'"' : '';
  return '<div class="'+cls+'"'+dnid+sty+'>'+
    '<span class="dot" style="background:'+color+'"></span>'+
    '<b>'+(no?no+'. ':'')+name+'</b> '+extra+'</div>';
}

function toggleLegend() {
  var body = document.getElementById('legBody');
  var toggleIcon = document.querySelector('.legend-toggle');
  if (body) body.classList.toggle('collapsed');
  if (toggleIcon) toggleIcon.classList.toggle('collapsed');
}

function toggleNode(nid, el) {
  if (!nid) return;
  if (gActiveNode === nid) { resetFilter(); return; }
  var prev = document.querySelector('.legend-item.active');
  if (prev) prev.classList.remove('active');
  gActiveNode = nid;
  if (el) el.classList.add('active');

  var routes = nodeToRoutes[nid];
  if (!routes) return;
  
  gAllLines.forEach(function(line, i) {
    var inSet = false;
    if (routes.indexOf('rt')>=0 && line===gRoadTripLine) inSet=true;
    if (routes.indexOf(i)>=0) inSet=true;
    if (inSet) {
      line.setOptions({strokeOpacity:0.85, strokeWeight: line===gRoadTripLine?7:5});
    } else {
      line.setOptions({strokeOpacity:0.10, strokeWeight: line===gRoadTripLine?1.5:1.5});
    }
  });
}

function resetFilter() {
  gActiveNode = null;
  var prev = document.querySelector('.legend-item.active');
  if (prev) prev.classList.remove('active');
  gAllLines.forEach(function(line) {
    line.setOptions({strokeOpacity: line===gRoadTripLine?0.7:0.65, strokeWeight: line===gRoadTripLine?6:4});
  });
}
