    d.style.cssText='background:#333;border-radius:50%;width:16px;height:16px;box-shadow:0 0 0 4px rgba(0,0,0,0.2)';
    var m=new google.maps.marker.AdvancedMarkerElement({map:gMap,position:{lat:-8.7481,lng:115.1672},content:d});
    m.addListener('click',function(){gIw.setContent('<b>✈️ DPS 공항</b>');gIw.open({map:gMap,anchor:m});});
  })();

  var rt=[
    {no:'1-1',lat:-8.8142,lng:115.1667,name:'가루다 위스누 꾸짜나',color:'#e74c3c',emoji:'🏛️',nid:'n11'},
    {no:'1-2',lat:-8.6510,lng:115.1345,name:'타나바락 절벽 (짱구)',color:'#e67e22',emoji:'🧗',nid:'n12'},
    {no:'1-3',lat:-8.8383,lng:115.1635,name:'팔밀라 비치클럽 (2h)',color:'#2ecc71',emoji:'🏖️',nid:'n13'},
    {no:'1-4',lat:-8.8294,lng:115.0843,name:'울루와뚜 사원',color:'#3498db',emoji:'🛕',nid:'n14'},
  ];
  rt.forEach(function(p){
    var m=mk(p.lat,p.lng,p.color,p.no,1);
    m.addListener('click',function(){gIw.setContent('<b>'+p.emoji+' '+p.no+'. '+p.name+'</b>');gIw.open({map:gMap,anchor:m});});
  });

  hotelRoutes.forEach(function(r){
    var path=r[0].map(function(c){return new google.maps.LatLng(c[0],c[1]);});
    var line=new google.maps.Polyline({
      path:path,map:gMap,strokeColor:r[5],strokeWeight:4,strokeOpacity:0.65,
      icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5,strokeColor:r[5],strokeWeight:2.5},repeat:'150px'}]
    });
    line.addListener('click',function(ev){gIw.setContent('🚗 '+r[1]+' · '+r[2]+'<br><small>'+r[3]+' → '+r[4]+'</small>');gIw.setPosition(ev.latLng);gIw.open(gMap);});
    gAllLines.push(line);
  });

  var ds=new google.maps.DirectionsService();
  ds.route({
    origin:{lat:-8.744,lng:115.1652},destination:{lat:-8.4979,lng:115.2756},
    waypoints:[{location:{lat:-8.8142,lng:115.1667},stopover:true},{location:{lat:-8.6510,lng:115.1345},stopover:true},{location:{lat:-8.8383,lng:115.1635},stopover:true},{location:{lat:-8.8294,lng:115.0843},stopover:true}],
    optimizeWaypoints:false,travelMode:google.maps.TravelMode.DRIVING,region:'ID',unitSystem:google.maps.UnitSystem.METRIC
  },function(result,status){
    if(status==='OK'){
      var legs=result.routes[0].legs, td=0, tt=0;
      legs.forEach(function(leg,i){
        td+=leg.distance.value;tt+=leg.duration.value;
        var dkm=(leg.distance.value/1000).toFixed(1);
        var dm=Math.round(leg.duration.value/60);
        var line=new google.maps.Polyline({
          path:(function(){var pts=[];leg.steps.forEach(function(s){if(s.path&&s.path.length)pts=pts.concat(Array.prototype.slice.call(s.path));});return pts;})(),
          map:gMap,strokeColor:'#ff6b6b',strokeWeight:6,strokeOpacity:0.7,
          icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3,strokeColor:'#ff6b6b',strokeWeight:3},repeat:i===legs.length-1?'200px':'150px'}]
        });
        line._info='🚗 '+dkm+'km · '+dm+'분<br><small>'+RT_NAMES[i]+'</small>';
        line._idx=i;
        line.addListener('click',function(ev){gIw.setContent(this._info);gIw.setPosition(ev.latLng);gIw.open(gMap);});
        gRtLines.push(line);
      });
      gRtLines.forEach(function(l){gAllLines.push(l);});
    }else{
      console.log('Roadtrip route error: '+status);
      // DirectionsService 실패 시 직선 폴리라인 폴백
      var rtStops=[{lat:-8.744,lng:115.1652},{lat:-8.8142,lng:115.1667},{lat:-8.6510,lng:115.1345},{lat:-8.8383,lng:115.1635},{lat:-8.8294,lng:115.0843},{lat:-8.4979,lng:115.2756}];
      for(var i=0;i<rtStops.length-1;i++){
        var dkm=(google.maps.geometry.spherical.computeDistanceBetween(new google.maps.LatLng(rtStops[i].lat,rtStops[i].lng),new google.maps.LatLng(rtStops[i+1].lat,rtStops[i+1].lng))/1000).toFixed(1);
        var line=new google.maps.Polyline({path:[rtStops[i],rtStops[i+1]],map:gMap,strokeColor:'#ff6b6b',strokeWeight:6,strokeOpacity:0.7,geodesic:true,
          icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3,strokeColor:'#ff6b6b',strokeWeight:3},repeat:'150px'}]});
        line._info='🚗 '+dkm+'km · 직선거리<br><small>'+RT_NAMES[i]+'</small>';
        line._idx=i;
        line.addListener('click',function(ev){gIw.setContent(this._info);gIw.setPosition(ev.latLng);gIw.open(gMap);});
        gRtLines.push(line);
      }
      gRtLines.forEach(function(l){gAllLines.push(l);});
      console.log('Roadtrip fallback loaded: '+gRtLines.length+' segments');
    }
  });

  buildLegend();
}

function buildLegend() {
  var w=document.createElement('div');w.className='legend-wrap';w.id='legWrap';
  w.innerHTML='<div class="legend-header"><div><h3>💒 발리 결혼여행 2026.09.14-24</h3><div style="font-size:11px;color:#888;margin-top:2px;">✈️ 서울 ↔ 발리 · 10박 11일</div></div><div class="legend-toggle">▼</div></div>'+
    '<div class="legend-body" id="legBody">'+
    '<div class="reset-btn" data-action="reset">🔄 전체보기</div>'+
    '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed #ccc;"><b style="color:#ff6b6b;">🗓️ 09/15 로드트립</b> <span class="badge">NEW</span><br><small style="color:#666;">공항 → 1-1 가루다 → 1-2 타나바락 → 1-3 팔밀라(2h) → 1-4 울루와뚜 → 카욘밸리</small></div>'+
    '<b>🏨 클릭시 경로 하이라이트</b><br>'+
    litem('✈️','airport','DPS 공항','#333','')+
    litem('1','n1','노보텔 발리 공항','#2196F3','09/14-15<small style=color:#666> 공항 인근</small>')+
    litem('1-1','n11','가루다 위스누 꾸짜나','#e74c3c','🏛️')+
    litem('1-2','n12','타나바락 절벽 (짱구)','#e67e22','🧗')+
    litem('1-3','n13','팔밀라 비치클럽 (2h)','#2ecc71','🏖️')+
    litem('1-4','n14','울루와뚜 사원','#3498db','🛕')+
    litem('2','n2','더 카욘 밸리 리조트','#4CAF50','09/15-18<small style=color:#666> 우붓</small>')+
    litem('3','n3','아야나 리조트 발리','#FF9800','09/18-21<small style=color:#666> 짐바란</small>')+
    litem('✕','','페레레난 (취소)','#999','100% 환불<cancelled>')+
    litem('4','n4','아야나 빌라스','#E91E63','09/21-23<small style=color:#666> Stayzaaa</small>')+
    litem('5','n5','알로프트 발리 꾸타','#9C27B0','09/23-24<small style=color:#666> 여기어때</small>')+
    '</div>';
  
  w.addEventListener('click',function(e){
    var t=e.target;
    if(t.closest('[data-action="reset"]')){resetFilter();return;}
    if(t.closest('.legend-header')){toggleLegend();return;}
    var li=t.closest('.legend-item');
    if(li){toggleNode(li.getAttribute('data-nid'),li);}
  });
  gMap.controls[google.maps.ControlPosition.RIGHT_TOP].push(w);
  var s=document.createElement('div');s.className='route-strip';
  s.innerHTML='🔴 로드트립 | ▶ 방향 표시 | 범례 클릭 = 하이라이트';
  gMap.controls[google.maps.ControlPosition.BOTTOM_LEFT].push(s);
}

function litem(no,nid,name,color,extra){
  var c=nid?'legend-item':'';var s=extra.indexOf('<cancelled>')>=0?' style="text-decoration:line-through;color:#999"':'';extra=extra.replace('<cancelled>','');
  return '<div class="'+c+'"'+(nid?' data-nid="'+nid+'"':'')+s+'>'+
    '<span class="dot" style="background:'+color+'"></span><b>'+(no?no+'. ':'')+name+'</b> '+extra+'</div>';
}

function toggleLegend(){var b=document.getElementById('legBody');var i=document.querySelector('.legend-toggle');if(b)b.classList.toggle('collapsed');if(i)i.classList.toggle('collapsed');}

function toggleNode(nid,el){
  if(!nid)return;if(gActiveNode===nid){resetFilter();return;}
  var p=document.querySelector('.legend-item.active');if(p)p.classList.remove('active');
  gActiveNode=nid;if(el)el.classList.add('active');
  var r=nodeToRoutes[nid];if(!r)return;
  gAllLines.forEach(function(l,i){
    var ok=false;
    r.forEach(function(v){
      if(typeof v==='string'&&v.slice(0,2)==='rt'){
        var si=parseInt(v.slice(2));
        if(l===gRtLines[si])ok=true;
      }else if(typeof v==='number'&&i===v){
        ok=true;
      }
    });
    var isRt=l._idx!==undefined;
    l.setOptions({strokeOpacity:ok?0.85:0.10,strokeWeight:ok?(isRt?7:5):(isRt?1.5:1.5)});
  });
}

function resetFilter(){
  gActiveNode=null;var p=document.querySelector('.legend-item.active');if(p)p.classList.remove('active');
  gAllLines.forEach(function(l){
    var isRt=l._idx!==undefined;
    l.setOptions({strokeOpacity:isRt?0.7:0.65,strokeWeight:isRt?6:4});
  });
}
</script>
