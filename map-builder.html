<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 매핑 빌더 - 점검 중</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
  .card { background: white; padding: 48px; border-radius: 16px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 400px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #666; line-height: 1.6; }
  .emoji { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🔧</div>
  <h1>서버 이전 중</h1>
  <p>더 안정적인 서비스를 위해<br>프록시 서버로 마이그레이션 중입니다.<br>잠시만 기다려주세요! 🙏</p>
</div>
</body>
</html>
